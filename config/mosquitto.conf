# Mosquitto configuration for Mesh Tester

# TCP listener on standard port
listener 1883 0.0.0.0

# WebSocket listener (optional — useful for browser clients)
listener 9001 0.0.0.0
protocol websockets

# Allow unauthenticated connections (dev/lab use only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information

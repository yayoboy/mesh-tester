<!DOCTYPE html>
<html lang="en" x-data="meshApp()" x-init="init()" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesh Tester</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0d1117', 1: '#161b22', 2: '#21262d', 3: '#30363d', 4: '#484f58' },
            ink:     { DEFAULT: '#c9d1d9', muted: '#8b949e', faint: '#484f58' },
          },
          fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'] },
        },
      },
    }
  </script>

  <!-- Phosphor Icons (duotone) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* Phosphor icon sizing helpers */
    .ph-xs  { font-size: 12px; }
    .ph-sm  { font-size: 14px; }
    .ph-md  { font-size: 16px; }
    .ph-lg  { font-size: 20px; }

    #log-feed { max-height: 220px; overflow-y: auto; scroll-behavior: smooth; }
    #log-feed::-webkit-scrollbar { width: 4px; }
    #log-feed::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .node-table tbody tr { transition: background 0.15s; }
    .node-table tbody tr:hover { background: #21262d; }
    @keyframes rowflash { 0%,100% { background: transparent } 50% { background: #21262d } }
    .row-flash { animation: rowflash 0.4s ease; }
  </style>
</head>

<body class="bg-surface text-ink min-h-screen flex flex-col" x-cloak>

  <!-- ───────────────────────── HEADER ──────────────────────────────────── -->
  <header class="bg-surface-1 border-b border-surface-3 px-5 py-2.5 flex items-center gap-5 flex-wrap select-none">

    <!-- Logo -->
    <div class="flex items-center gap-2">
      <i class="ph-duotone ph-broadcast ph-lg text-blue-400"></i>
      <span class="text-ink font-semibold text-sm tracking-wide">Mesh Tester</span>
    </div>

    <!-- MQTT status -->
    <div class="flex items-center gap-1.5 text-xs">
      <span :class="status.mqtt_connected ? 'bg-green-500' : 'bg-red-500'"
            class="w-2 h-2 rounded-full inline-block"></span>
      <span class="text-ink-muted">MQTT</span>
    </div>

    <!-- Run status -->
    <div class="flex items-center gap-1.5 text-xs">
      <template x-if="status.running && !status.paused">
        <span class="bg-green-500 w-2 h-2 rounded-full"></span>
      </template>
      <template x-if="status.paused">
        <span class="bg-yellow-500 w-2 h-2 rounded-full"></span>
      </template>
      <template x-if="!status.running">
        <span class="bg-surface-4 w-2 h-2 rounded-full"></span>
      </template>
      <span class="text-ink-muted"
        x-text="status.running && !status.paused ? 'running' : status.paused ? 'paused' : 'idle'">
      </span>
    </div>

    <!-- Scenario -->
    <div class="text-xs text-ink-muted">
      Scenario: <span class="text-blue-400 font-medium" x-text="status.scenario || '—'"></span>
    </div>

    <!-- Zone -->
    <div class="text-xs text-ink-muted">
      Zone: <span class="text-ink" x-text="status.zone || '—'"></span>
    </div>

    <!-- Right side stats -->
    <div class="ml-auto flex items-center gap-5 text-xs text-ink-muted">
      <span>Boards: <span class="text-ink font-medium" x-text="nodes.length"></span></span>
      <span>Sent: <span class="text-ink font-medium" x-text="status.total_sent || 0"></span></span>
      <span class="flex items-center gap-1">
        <i class="ph-duotone ph-clock ph-sm"></i>
        <span x-text="uptimeStr"></span>
      </span>
    </div>
  </header>

  <!-- ───────────────────────── MAIN GRID ───────────────────────────────── -->
  <div class="flex-1 flex overflow-hidden">

    <!-- ── Left: node table + log ──────────────────────────────────────── -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Board / Node table -->
      <div class="flex-1 overflow-auto">
        <table class="node-table w-full text-xs border-collapse">
          <thead class="sticky top-0 bg-surface-1 text-ink-muted uppercase tracking-wider text-[10px]">
            <tr>
              <th class="px-3 py-2 text-left font-medium">
                <div class="flex items-center gap-1">
                  <i class="ph-duotone ph-cpu ph-sm"></i>
                  Board ID
                </div>
              </th>
              <th class="px-3 py-2 text-left font-medium">Name</th>
              <th class="px-3 py-2 text-left font-medium hidden lg:table-cell">MQTT Topic</th>
              <th class="px-3 py-2 text-right font-medium">Lat</th>
              <th class="px-3 py-2 text-right font-medium">Lon</th>
              <th class="px-3 py-2 text-right font-medium">Alt</th>
              <th class="px-3 py-2 text-right font-medium">Sent</th>
              <th class="px-3 py-2 text-center font-medium">State</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-surface-2">
            <template x-if="nodes.length === 0">
              <tr>
                <td colspan="8" class="px-3 py-10 text-center text-ink-faint text-sm">
                  Connecting…
                </td>
              </tr>
            </template>
            <template x-for="node in nodes" :key="node.id">
              <tr :id="'row-' + node.id.slice(1)" class="cursor-default">
                <!-- Board ID -->
                <td class="px-3 py-2 font-mono text-blue-400" x-text="node.id"></td>
                <!-- Name -->
                <td class="px-3 py-2 text-ink font-medium" x-text="node.longname"></td>
                <!-- Topic -->
                <td class="px-3 py-2 text-ink-faint text-[10px] hidden lg:table-cell truncate max-w-xs"
                    x-text="node.topic || '—'"></td>
                <!-- Lat -->
                <td class="px-3 py-2 text-right tabular-nums text-ink-muted"
                    x-text="node.lat?.toFixed(4)"></td>
                <!-- Lon -->
                <td class="px-3 py-2 text-right tabular-nums text-ink-muted"
                    x-text="node.lon?.toFixed(4)"></td>
                <!-- Alt -->
                <td class="px-3 py-2 text-right tabular-nums text-ink-muted"
                    x-text="node.alt"></td>
                <!-- Sent -->
                <td class="px-3 py-2 text-right tabular-nums font-semibold text-ink"
                    x-text="node.sent"></td>
                <!-- State badge -->
                <td class="px-3 py-2 text-center">
                  <template x-if="node.is_rogue">
                    <span class="inline-flex items-center gap-1 bg-red-900/40 text-red-400 text-[10px] px-1.5 py-0.5 rounded">
                      <i class="ph-duotone ph-warning ph-xs"></i>
                      rogue
                    </span>
                  </template>
                  <template x-if="!node.is_rogue">
                    <span class="inline-flex items-center gap-1 text-green-600 text-[10px]">
                      <i class="ph-duotone ph-check-circle ph-xs"></i>
                      ok
                    </span>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Live log ─────────────────────────────────────────────────────── -->
      <div class="border-t border-surface-3 bg-surface-1 shrink-0">
        <div class="flex items-center justify-between px-4 py-1.5 border-b border-surface-2">
          <div class="flex items-center gap-1.5 text-[10px] text-ink-muted uppercase tracking-wider">
            <i class="ph-duotone ph-list-bullets ph-sm"></i>
            Live log
          </div>
          <button @click="log = []"
            class="flex items-center gap-1 text-[10px] text-ink-faint hover:text-ink transition-colors">
            <i class="ph-duotone ph-trash ph-xs"></i>
            clear
          </button>
        </div>
        <div id="log-feed" class="px-4 py-2 space-y-0.5">
          <template x-for="(entry, i) in log" :key="i">
            <div class="flex items-start gap-2 text-[11px] leading-relaxed">
              <span class="text-ink-faint tabular-nums shrink-0" x-text="entry.time"></span>
              <!-- Text message -->
              <template x-if="entry.level === 'text'">
                <span>
                  <i class="ph-duotone ph-chat-circle ph-xs text-green-500 mr-0.5"></i>
                  <span class="text-green-400 font-medium" x-text="entry.node"></span>
                  <span class="text-ink-faint mx-1">›</span>
                  <span class="text-ink" x-text="entry.text"></span>
                </span>
              </template>
              <!-- Position message -->
              <template x-if="entry.level === 'position'">
                <span>
                  <i class="ph-duotone ph-map-pin ph-xs text-blue-400 mr-0.5"></i>
                  <span class="text-blue-400 font-medium" x-text="entry.node"></span>
                  <span class="text-ink-faint mx-1">at</span>
                  <span class="text-ink-muted" x-text="`${entry.lat}, ${entry.lon}`"></span>
                </span>
              </template>
            </div>
          </template>
          <div x-show="log.length === 0" class="text-ink-faint text-xs py-2">
            Waiting for traffic…
          </div>
        </div>
      </div>
    </div>

    <!-- ── Right sidebar: controls ─────────────────────────────────────── -->
    <aside class="w-56 border-l border-surface-3 bg-surface-1 flex flex-col gap-5 p-4 overflow-y-auto shrink-0">

      <!-- Transport -->
      <section>
        <p class="text-ink-faint text-[10px] uppercase tracking-wider mb-2.5 flex items-center gap-1.5">
          <i class="ph-duotone ph-play-circle ph-sm"></i>
          Control
        </p>
        <div class="flex flex-col gap-2">
          <button @click="apiPost('/api/start')"
            class="w-full flex items-center justify-center gap-1.5 px-3 py-2 rounded
                   bg-green-700 hover:bg-green-600 text-white text-xs font-medium transition-colors">
            <i class="ph-duotone ph-play ph-sm"></i>
            Start
          </button>
          <button @click="apiPost('/api/pause')"
            class="w-full flex items-center justify-center gap-1.5 px-3 py-2 rounded
                   bg-yellow-700 hover:bg-yellow-600 text-white text-xs font-medium transition-colors">
            <i class="ph-duotone ph-pause ph-sm"></i>
            Pause
          </button>
          <button @click="apiPost('/api/stop')"
            class="w-full flex items-center justify-center gap-1.5 px-3 py-2 rounded
                   bg-red-800 hover:bg-red-700 text-white text-xs font-medium transition-colors">
            <i class="ph-duotone ph-stop ph-sm"></i>
            Stop
          </button>
        </div>
      </section>

      <!-- Scenario -->
      <section>
        <p class="text-ink-faint text-[10px] uppercase tracking-wider mb-2.5 flex items-center gap-1.5">
          <i class="ph-duotone ph-squares-four ph-sm"></i>
          Scenario
        </p>
        <div class="flex flex-col gap-1">
          <template x-for="s in scenarios" :key="s.key">
            <button
              @click="setScenario(s.key)"
              :class="status.scenario === s.key
                ? 'bg-blue-700 text-white'
                : 'bg-surface-2 text-ink-muted hover:bg-surface-3 hover:text-ink'"
              class="w-full flex items-center gap-2 px-3 py-2 rounded text-xs text-left transition-colors">
              <i :class="`ph-duotone ph-${s.icon} ph-sm`"></i>
              <span x-text="s.label"></span>
            </button>
          </template>
        </div>
      </section>

      <!-- Zone -->
      <section>
        <p class="text-ink-faint text-[10px] uppercase tracking-wider mb-2.5 flex items-center gap-1.5">
          <i class="ph-duotone ph-map-trifold ph-sm"></i>
          Zone
        </p>
        <select x-model="selectedZone" @change="setZone(selectedZone)"
          class="w-full bg-surface-2 border border-surface-3 text-ink text-xs rounded
                 px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer">
          <option value="">Select zone…</option>
          <template x-for="z in zones" :key="z.name">
            <option :value="z.name" x-text="`${z.name}  (r=${z.radius}km)`"></option>
          </template>
        </select>
        <p class="text-ink-faint text-[10px] mt-1">Stop traffic before changing zone.</p>
      </section>

      <!-- Info -->
      <section class="mt-auto pt-3 border-t border-surface-2">
        <div class="text-[10px] text-ink-faint space-y-1">
          <div class="flex justify-between">
            <span>Boards</span>
            <span class="text-ink" x-text="nodes.length"></span>
          </div>
          <div class="flex justify-between">
            <span>Zone</span>
            <span class="text-ink" x-text="status.zone || '—'"></span>
          </div>
          <div class="flex justify-between">
            <span>Total sent</span>
            <span class="text-ink" x-text="status.total_sent || 0"></span>
          </div>
          <div class="flex justify-between items-center pt-1 border-t border-surface-3">
            <span>API docs</span>
            <a href="/docs" target="_blank"
              class="flex items-center gap-0.5 text-blue-400 hover:text-blue-300 transition-colors">
              <i class="ph-duotone ph-arrow-square-out ph-xs"></i>
              /docs
            </a>
          </div>
        </div>
      </section>
    </aside>
  </div>

  <!-- ───────────────────────── Alpine app ──────────────────────────────── -->
  <script>
    function meshApp() {
      return {
        status: {
          running: false, paused: false, mqtt_connected: false,
          scenario: 'idle', zone: '', total_sent: 0, uptime: 0, node_count: 0,
        },
        nodes: [],
        log: [],
        zones: [],
        selectedZone: '',
        uptimeStr: '00:00:00',
        _baseTs: 0,
        _serverUptime: 0,
        _uptimeTick: null,
        _ws: null,

        // Phosphor icon names (duotone)
        scenarios: [
          { key: 'idle',  label: 'Idle',                icon: 'radio'                },
          { key: 'chat',  label: 'Chat',                icon: 'chat-circle'          },
          { key: 'walk',  label: 'Walk',                icon: 'person-simple-walk'   },
          { key: 'burst', label: 'Burst',               icon: 'lightning'            },
        ],

        init() {
          this.connectWS();
          this.loadZones();
          this._startUptimeTick();
        },

        connectWS() {
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          this._ws = new WebSocket(`${proto}://${location.host}/ws`);
          this._ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if      (msg.type === 'status')         this.applyStatus(msg);
            else if (msg.type === 'nodes_snapshot') this.nodes = msg.nodes;
            else if (msg.type === 'node_update')    this.applyNodeUpdate(msg);
            else if (msg.type === 'log')            this.appendLog(msg);
          };
          this._ws.onclose = () => setTimeout(() => this.connectWS(), 2000);
        },

        applyStatus(s) {
          this.status = { ...this.status, ...s };
          this._serverUptime = s.uptime || 0;
          this._baseTs = Date.now();
        },

        applyNodeUpdate(data) {
          const node = this.nodes.find(n => n.id === data.node_id);
          if (node) {
            node.sent = data.sent;
            if (data.lat !== undefined) { node.lat = data.lat; node.lon = data.lon; }
            const row = document.getElementById('row-' + data.node_id.slice(1));
            if (row) {
              row.classList.remove('row-flash');
              void row.offsetWidth;
              row.classList.add('row-flash');
            }
          }
        },

        appendLog(msg) {
          const t = new Date(msg.ts * 1000).toTimeString().slice(0, 8);
          this.log.push({ ...msg, time: t });
          if (this.log.length > 200) this.log.shift();
          this.$nextTick(() => {
            const feed = document.getElementById('log-feed');
            if (feed) feed.scrollTop = feed.scrollHeight;
          });
        },

        async apiPost(url) {
          try {
            const r = await fetch(url, { method: 'POST' });
            return await r.json();
          } catch(e) { console.error('apiPost', url, e); }
        },

        setScenario(name) { this.apiPost(`/api/scenario/${name}`); },
        setZone(name)     { if (name) this.apiPost(`/api/zone/${name}`); },

        async loadZones() {
          try { this.zones = await fetch('/api/zones').then(r => r.json()); }
          catch(e) { console.error(e); }
        },

        _startUptimeTick() {
          this._uptimeTick = setInterval(() => {
            if (!this.status.running) return;
            const elapsed = this._serverUptime + Math.floor((Date.now() - this._baseTs) / 1000);
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            this.uptimeStr = `${h}:${m}:${s}`;
          }, 1000);
        },
      }
    }
  </script>
</body>
</html>
